<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robotics Introduction — Quiz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');

  :root{
    --paper:#eef3f6;
    --grid:#c7d6e0;
    --ink:#132635;
    --ink-soft:#4c6579;
    --navy:#1c3a52;
    --accent:#e8622c;
    --accent-soft:#f7d9c9;
    --good:#2f7a4f;
    --good-bg:#dcf0e2;
    --bad:#b23a34;
    --bad-bg:#f7dcda;
    --card:#ffffff;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    font-family:'Space Grotesk', sans-serif;
    background:
      linear-gradient(var(--grid) 1px, transparent 1px) 0 0/32px 32px,
      linear-gradient(90deg, var(--grid) 1px, transparent 1px) 0 0/32px 32px,
      var(--paper);
    color:var(--ink);
    min-height:100vh;
    padding:28px 16px 60px;
  }

  .wrap{max-width:680px;margin:0 auto;}

  header{margin-bottom:22px;}

  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--accent);
    font-weight:600;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .eyebrow::before{
    content:"";
    width:22px;height:2px;
    background:var(--accent);
    display:inline-block;
  }

  h1{
    font-size:clamp(24px,4vw,34px);
    margin:10px 0 6px;
    letter-spacing:-0.01em;
    font-weight:700;
  }

  p.sub{
    color:var(--ink-soft);
    font-size:14.5px;
    max-width:56ch;
    line-height:1.5;
    margin:0;
  }

  .progress-track{
    height:6px;
    background:var(--grid);
    border-radius:3px;
    margin-top:22px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:var(--accent);
    width:0%;
    transition:width .3s ease;
  }
  .progress-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    margin-top:8px;
    display:flex;
    justify-content:space-between;
  }

  .card{
    background:var(--card);
    border:2px solid var(--grid);
    border-radius:8px;
    padding:26px 24px;
    margin-top:20px;
  }

  .q-num{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--accent);
    font-weight:700;
    letter-spacing:.06em;
    margin-bottom:8px;
  }

  .q-text{
    font-size:19px;
    font-weight:600;
    line-height:1.4;
    margin-bottom:20px;
  }

  .options{display:flex;flex-direction:column;gap:10px;}

  .option{
    background:var(--paper);
    border:2px solid var(--grid);
    border-radius:6px;
    padding:13px 16px;
    font-size:14.5px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:12px;
    transition:border-color .12s ease, background .12s ease;
  }
  .option:hover{border-color:var(--navy);}
  .option .letter{
    font-family:'IBM Plex Mono',monospace;
    font-weight:700;
    font-size:12px;
    color:var(--ink-soft);
    background:var(--card);
    border:1px solid var(--grid);
    border-radius:4px;
    width:22px;height:22px;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }

  .option.selected{border-color:var(--navy);background:var(--accent-soft);}
  .option.correct{border-color:var(--good);background:var(--good-bg);}
  .option.correct .letter{background:var(--good);color:#fff;border-color:var(--good);}
  .option.incorrect{border-color:var(--bad);background:var(--bad-bg);}
  .option.incorrect .letter{background:var(--bad);color:#fff;border-color:var(--bad);}
  .option.disabled{cursor:default;}

  .explain{
    margin-top:16px;
    font-size:13px;
    color:var(--ink-soft);
    background:var(--paper);
    border-left:3px solid var(--accent);
    padding:10px 14px;
    border-radius:4px;
    display:none;
    line-height:1.5;
  }
  .explain.show{display:block;}

  .controls{
    margin-top:22px;
    display:flex;
    justify-content:flex-end;
  }

  button.action{
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    font-weight:600;
    letter-spacing:.04em;
    text-transform:uppercase;
    padding:12px 22px;
    border-radius:6px;
    border:2px solid var(--navy);
    background:var(--navy);
    color:#fff;
    cursor:pointer;
    transition:transform .1s ease, background .15s ease, opacity .15s ease;
  }
  button.action:hover{background:#264a67;}
  button.action:active{transform:translateY(1px);}
  button.action:disabled{opacity:.4;cursor:not-allowed;}

  button.reset{
    background:transparent;
    color:var(--ink-soft);
    border:2px solid var(--grid);
  }
  button.reset:hover{color:var(--ink);border-color:var(--ink-soft);background:transparent;}

  /* results screen */
  .results{display:none;text-align:center;padding:36px 24px;}
  .results.show{display:block;}
  .score-big{
    font-family:'IBM Plex Mono',monospace;
    font-size:52px;
    font-weight:700;
    color:var(--navy);
    line-height:1;
    margin:6px 0 4px;
  }
  .score-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--ink-soft);
  }
  .score-msg{margin:18px 0 0;font-size:15px;color:var(--ink-soft);line-height:1.5;}
  .results .controls{justify-content:center;margin-top:26px;}

  footer{
    margin-top:30px;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    opacity:.7;
    text-align:center;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Robotics 101</div>
    <h1>Robotics Introduction Quiz</h1>
    <p class="sub">10 questions covering the basics: what a robot is, its core parts, how it senses and moves, and the ideas behind autonomy.</p>
  </header>

  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label">
    <span id="progressText">Question 1 of 10</span>
    <span id="scoreRunning">Score: 0</span>
  </div>

  <div class="card" id="quizCard"></div>

  <div class="card results" id="resultsCard">
    <div class="score-label">Final score</div>
    <div class="score-big" id="finalScore">0/10</div>
    <p class="score-msg" id="finalMsg"></p>
    <div class="controls">
      <button class="action" id="retryBtn">Retake quiz</button>
    </div>
  </div>

  <footer>Click an option to lock in your answer · one attempt per question</footer>
</div>

<script>
const QUESTIONS = [
  {
    q: "What is a robot, in the most general sense?",
    options: [
      "Any machine plugged into electricity",
      "A programmable machine that senses, decides, and acts to perform tasks",
      "A computer with a screen and keyboard",
      "Any object that moves on its own, like a falling rock"
    ],
    correct: 1,
    explain: "A robot combines sensing, decision-making, and physical action — that combination is what separates it from a plain machine or appliance."
  },
  {
    q: "Which three components form the basic building blocks of most robots?",
    options: [
      "Screen, battery, keyboard",
      "Sensors, controller (processor), actuators",
      "Wheels, camera, Wi-Fi chip",
      "Motor, paint, chassis"
    ],
    correct: 1,
    explain: "Sensors gather information, the controller processes it and decides, and actuators (motors, grippers, etc.) carry out the action."
  },
  {
    q: "What is the role of an 'actuator' in a robot?",
    options: [
      "It stores data for later use",
      "It senses light and sound",
      "It converts energy into physical movement or action",
      "It connects the robot to the internet"
    ],
    correct: 2,
    explain: "Actuators are the 'muscles' of a robot — motors, hydraulics, or pneumatics that turn electrical signals into motion."
  },
  {
    q: "A robotic vacuum cleaner that maps a room and avoids furniture on its own is an example of:",
    options: [
      "A teleoperated robot",
      "A fixed, non-programmable machine",
      "An autonomous robot",
      "A virtual robot"
    ],
    correct: 2,
    explain: "It perceives its environment and makes navigation decisions without a human directly steering it — that's autonomy."
  },
  {
    q: "What does 'degrees of freedom' (DOF) describe in a robot arm?",
    options: [
      "How many programming languages it supports",
      "The independent ways a joint or system can move (e.g., rotate, slide)",
      "How many hours it can run on battery",
      "The number of sensors attached to it"
    ],
    correct: 1,
    explain: "Each independent axis of movement — like a joint that can rotate or a segment that can slide — adds one degree of freedom."
  },
  {
    q: "Which sensor type would a self-driving car most likely use to measure distance to nearby objects?",
    options: [
      "Thermometer",
      "LIDAR or ultrasonic sensor",
      "Microphone",
      "Barometer"
    ],
    correct: 1,
    explain: "LIDAR and ultrasonic sensors bounce light or sound off objects to measure how far away they are — key for obstacle detection."
  },
  {
    q: "In robotics, what is 'end effector' referring to?",
    options: [
      "The robot's power supply",
      "The part at the end of a robotic arm that interacts with the environment, like a gripper",
      "The final line of code in a robot's program",
      "A safety shutdown switch"
    ],
    correct: 1,
    explain: "The end effector is the 'hand' of a robotic arm — it could be a gripper, welding tool, suction cup, or other tool suited to the task."
  },
  {
    q: "What best describes 'teleoperation'?",
    options: [
      "A robot fully controlled in real time by a human operator",
      "A robot that repairs itself automatically",
      "A robot that only works with other robots",
      "A robot with no sensors at all"
    ],
    correct: 0,
    explain: "Teleoperated robots have essentially no independent decision-making — a human directs every move, often from a distance."
  },
  {
    q: "Why is feedback (sense → think → act → repeat) important for a robot?",
    options: [
      "It lets the robot check if its action worked and adjust in real time",
      "It reduces the robot's power consumption to zero",
      "It's only needed for robots that talk",
      "It replaces the need for actuators"
    ],
    correct: 0,
    explain: "Without a feedback loop, a robot can't tell whether an action succeeded or the environment changed, so it can't adapt."
  },
  {
    q: "Which of these is generally considered the LEAST autonomous type of robot?",
    options: [
      "A Mars rover making local navigation decisions",
      "A warehouse robot routing itself around obstacles",
      "A remote-controlled toy car",
      "A robot vacuum building its own map"
    ],
    correct: 2,
    explain: "A remote-controlled toy has no independent perception or decision-making — every move comes directly from the human operator."
  }
];

let current = 0;
let score = 0;
let answered = false;

const quizCard = document.getElementById('quizCard');
const resultsCard = document.getElementById('resultsCard');
const progressFill = document.getElementById('progressFill');
const progressText = document.getElementById('progressText');
const scoreRunning = document.getElementById('scoreRunning');

function renderQuestion(){
  answered = false;
  const item = QUESTIONS[current];
  progressFill.style.width = ((current)/QUESTIONS.length*100) + '%';
  progressText.textContent = `Question ${current+1} of ${QUESTIONS.length}`;
  scoreRunning.textContent = `Score: ${score}`;

  const letters = ['A','B','C','D'];
  quizCard.innerHTML = `
    <div class="q-num">Q${current+1}</div>
    <div class="q-text">${item.q}</div>
    <div class="options" id="optionsWrap">
      ${item.options.map((opt,i)=>`
        <div class="option" data-idx="${i}">
          <span class="letter">${letters[i]}</span>
          <span>${opt}</span>
        </div>`).join('')}
    </div>
    <div class="explain" id="explainBox"></div>
    <div class="controls">
      <button class="action" id="nextBtn" disabled>${current === QUESTIONS.length-1 ? 'See results' : 'Next question'}</button>
    </div>
  `;

  document.querySelectorAll('.option').forEach(el=>{
    el.addEventListener('click', ()=>selectOption(el, item));
  });
  document.getElementById('nextBtn').addEventListener('click', nextQuestion);
}

function selectOption(el, item){
  if(answered) return;
  answered = true;
  const idx = parseInt(el.dataset.idx);
  const options = document.querySelectorAll('.option');

  options.forEach(o=>o.classList.add('disabled'));

  if(idx === item.correct){
    el.classList.add('correct');
    score++;
  } else {
    el.classList.add('incorrect');
    options[item.correct].classList.add('correct');
  }

  const explainBox = document.getElementById('explainBox');
  explainBox.textContent = item.explain;
  explainBox.classList.add('show');

  scoreRunning.textContent = `Score: ${score}`;
  document.getElementById('nextBtn').disabled = false;
}

function nextQuestion(){
  current++;
  if(current >= QUESTIONS.length){
    showResults();
  } else {
    renderQuestion();
  }
}

function showResults(){
  progressFill.style.width = '100%';
  progressText.textContent = `Question ${QUESTIONS.length} of ${QUESTIONS.length}`;
  quizCard.style.display = 'none';
  resultsCard.classList.add('show');

  document.getElementById('finalScore').textContent = `${score}/${QUESTIONS.length}`;

  let msg;
  const pct = score / QUESTIONS.length;
  if(pct === 1) msg = "Perfect score — you've got the fundamentals of robotics down cold.";
  else if(pct >= 0.7) msg = "Solid grasp of the basics. Review the missed ones and you're set.";
  else if(pct >= 0.4) msg = "You've got a start — worth another pass through the core concepts.";
  else msg = "Good first attempt. Try again to lock in sensors, actuators, and autonomy.";
  document.getElementById('finalMsg').textContent = msg;
}

document.getElementById('retryBtn').addEventListener('click', ()=>{
  current = 0; score = 0; answered = false;
  resultsCard.classList.remove('show');
  quizCard.style.display = 'block';
  renderQuestion();
});

renderQuestion();
</script>
</body>
</html>
