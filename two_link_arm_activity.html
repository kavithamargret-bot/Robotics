<h2 class="sr-only">Interactive two-link ruler robot arm: adjust joint angles to move the marker tip and try to reach a target point, demonstrating forward and inverse kinematics.</h2>
<div style="display:flex;flex-direction:column;gap:14px;max-width:520px;margin:0 auto">
<svg width="100%" viewBox="0 0 520 380" style="background:var(--surface-1);border-radius:12px">
<line x1="60" y1="320" x2="460" y2="320" stroke="var(--border-strong)" stroke-width="1"/>
<circle id="base" cx="150" cy="320" r="7" fill="#888780"/>
<rect id="link1" x="0" y="-5" width="120" height="10" rx="4" fill="#B4B2A9" stroke="var(--t)" stroke-width="1" transform="translate(150,320) rotate(-30)"/>
<circle id="joint2" cx="253.9" cy="260" r="7" fill="#D85A30"/>
<rect id="link2" x="0" y="-5" width="100" height="10" rx="4" fill="#B4B2A9" stroke="var(--t)" stroke-width="1" transform="translate(253.9,260) rotate(-75)"/>
<circle id="tip" cx="279.8" cy="163.6" r="6" fill="#0F6E56"/>
<circle id="target" cx="330" cy="160" r="9" fill="none" stroke="#D4537E" stroke-width="2" stroke-dasharray="3 3"/>
<text class="ts" x="345" y="164" fill="#993556">target</text>
</svg>
<div style="display:flex;align-items:center;gap:12px">
<label style="font-size:14px;color:var(--text-secondary);min-width:80px">Joint 1 angle</label>
<input type="range" id="a1" min="-90" max="90" value="-30" step="1" style="flex:1">
<span id="a1out" style="font-size:14px;font-weight:500;min-width:44px;text-align:right">-30°</span>
</div>
<div style="display:flex;align-items:center;gap:12px">
<label style="font-size:14px;color:var(--text-secondary);min-width:80px">Joint 2 angle</label>
<input type="range" id="a2" min="-150" max="150" value="-75" step="1" style="flex:1">
<span id="a2out" style="font-size:14px;font-weight:500;min-width:44px;text-align:right">-75°</span>
</div>
<div style="font-size:13px;color:var(--text-secondary)">Link 1 = 120, link 2 = 100. Marker tip position: <span id="pos" style="font-weight:500;color:var(--text-primary)"></span></div>
</div>
<script>
const L1=120,L2=100,baseX=150,baseY=320;
const a1=document.getElementById('a1'),a2=document.getElementById('a2');
function update(){
  const t1=+a1.value, t2=+a2.value;
  document.getElementById('a1out').textContent=t1+'°';
  document.getElementById('a2out').textContent=t2+'°';
  const r1=-t1*Math.PI/180, r2=r1-(t2*Math.PI/180)+r1-r1;
  const rad1=-t1*Math.PI/180;
  const jx=baseX+L1*Math.cos(rad1), jy=baseY+L1*Math.sin(rad1);
  const rad2=rad1-(t2*Math.PI/180);
  const tx=jx+L2*Math.cos(rad2), ty=jy+L2*Math.sin(rad2);
  document.getElementById('link1').setAttribute('transform',`translate(${baseX},${baseY}) rotate(${-t1})`);
  document.getElementById('joint2').setAttribute('cx',jx);
  document.getElementById('joint2').setAttribute('cy',jy);
  document.getElementById('link2').setAttribute('transform',`translate(${jx},${jy}) rotate(${-t1-t2})`);
  document.getElementById('tip').setAttribute('cx',tx);
  document.getElementById('tip').setAttribute('cy',ty);
  document.getElementById('pos').textContent=`(${Math.round(tx-baseX)}, ${Math.round(baseY-ty)})`;
}
a1.addEventListener('input',update);
a2.addEventListener('input',update);
update();
</script>
